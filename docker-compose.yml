#name: kefir-project
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kefir-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Ghbdtnbr123!
      - POSTGRES_DB=kefir_db
      - POSTGRES_MULTIPLE_DATABASES=auth_db,user_db,sklad_db,delivery_db
      - POSTGRES_MAX_CONNECTIONS=500 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - my-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kefir_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Бэкенд сервисы
  api-gateway:
    build: ./Backend/ApiGateWay
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8097
      - USER_SERVICE_URL=http://user-service:8081
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - DELIVERY_SERVICE_URL=http://delivery-service:8083
      - COLLECTOR_SERVICE_URL=http://collector-service:8084
      - CART_SERVICE_URL=http://cart-service:8085
      - OFFICE_SERVICE_URL=http://office-service:8086
      - TRANSACTIONSAGA_SERVICE_URL=http://transactionsaga-service:8090
      - PAYMENT_SERVICE_URL=http://payment-service:8099
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/kefir_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ghbdtnbr123!
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build: ./Backend/Auth
    ports:
      - "8097:8097"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/kefir_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ghbdtnbr123!
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE=5
      - SPRING_DATASOURCE_HIKARI_MINIMUMIDLE=2 
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ./Backend/User
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/kefir_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ghbdtnbr123!
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE=5
      - SPRING_DATASOURCE_HIKARI_MINIMUMIDLE=2 
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build: ./Backend/Product
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/kefir_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Ghbdtnbr123!
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE=5
      - SPRING_DATASOURCE_HIKARI_MINIMUMIDLE=2 
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  delivery-service:
    build: ./Backend/Delivery
    ports:
