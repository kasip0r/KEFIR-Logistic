#name: kefir-project

services:
  postgres:
    image: postgres:15-alpine
    container_name: kefir-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}  
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}   
      - POSTGRES_DB=${POSTGRES_DB}              
      - POSTGRES_MULTIPLE_DATABASES=auth_db,user_db,sklad_db,delivery_db
      - POSTGRES_MAX_CONNECTIONS=500 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - my-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./Backend/ApiGateWay
    ports:
      - "8080:8080"
    env_file:
      - .env.docker
    environment:
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - PRODUCT_SERVICE_URL=${PRODUCT_SERVICE_URL}
      - DELIVERY_SERVICE_URL=${DELIVERY_SERVICE_URL}
      - COLLECTOR_SERVICE_URL=${COLLECTOR_SERVICE_URL}
      - CART_SERVICE_URL=${CART_SERVICE_URL}
      - OFFICE_SERVICE_URL=${OFFICE_SERVICE_URL}
      - TRANSACTIONSAGA_SERVICE_URL=${TRANSACTIONSAGA_SERVICE_URL}
      - PAYMENT_SERVICE_URL=${PAYMENT_SERVICE_URL}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  auth-service:
    build: ./Backend/Auth
    ports:
      - "8097:8097"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build: ./Backend/User
    ports:
      - "8081:8081"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    build: ./Backend/Product
    ports:
      - "8082:8082"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  delivery-service:
    build: ./Backend/Delivery
    ports:
      - "8083:8083"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  collector-service:
    build: ./Backend/Collector
    ports:
      - "8084:8084"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  cart-service:
    build: ./Backend/Carts
    ports:
      - "8085:8085"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  office-service:
    build: ./Backend/Office
    ports:
      - "8086:8086"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  payment-service:
    build: ./Backend/Payment
    ports:
      - "8099:8099"
    env_file:
      - .env.docker 
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  transactionsaga-service:
    build: ./Backend/TransactionSaga
    ports:
      - "8090:8090"
    env_file:
      - .env.docker
    networks:
      - my-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./kefir-react-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    networks:
      - my-network
    volumes:
      - ./kefir-react-app:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - api-gateway
              
  nginx:
    image: nginx:alpine
    container_name: kefir-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./kefir-react-app/build:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway
    networks:
      - my-network
    restart: unless-stopped

networks:
  my-network:
    driver: bridge

volumes:
  postgres_data:
    name: kefir-postgres-data