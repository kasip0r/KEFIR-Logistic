    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./kefir-react-app
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    networks:
      - my-network
    volumes:
      - ./kefir-react-app:/app
      - /app/node_modules
    restart: unless-stopped
    depends_on:
      - api-gateway

networks:
  my-network:
    driver: bridge

volumes:
  postgres_data:
    name: kefir-postgres-data